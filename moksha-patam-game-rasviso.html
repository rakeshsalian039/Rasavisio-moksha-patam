<style>

<button class="toggle-debug" onclick="document.getElementById('debug').classList.toggle('show')">debug</button>

<script>
window.__puterLoaded=false;window.__puterError=false;
const D={el:null,init(){this.el=document.getElementById('debug')},log(m,t=''){if(!this.el)return;const l=document.createElement('div');l.className=t;l.textContent=`${new Date().toLocaleTimeString()} ${m}`;this.el.appendChild(l);this.el.scrollTop=9999},ok(m){this.log(m,'ok')},err(m){this.log(m,'err')},w(m){this.log(m,'w')}};
</script>
<script src="https://js.puter.com/v2/" onload="window.__puterLoaded=true" onerror="window.__puterError=true"></script>

<script>
/* ═══ VOICE ENGINE v4 ═══ */
let chosenLang = 'en'; // 'en' or 'hi'
let audioUnlocked = false; // tracks if user has clicked (autoplay policy)

const Voice = {
  audio: null, muted: false, engine: 'detecting', ready: false,

  init() {
    D.init(); D.log('Voice init...');
    if (window.__puterLoaded && typeof puter !== 'undefined') {
      this.engine = 'puter'; this.ready = true;
      D.ok('Puter.js loaded! AI voice available.');
    } else if ('speechSynthesis' in window) {
      this.engine = 'browser'; this.ready = true;
      D.w('Puter.js unavailable. Browser speech fallback.');
    } else { this.engine = 'none'; D.err('No speech available.'); }
    this.updateBadge();
  },

  updateBadge() {
    document.querySelectorAll('.voice-status').forEach(el => {
      if (this.engine === 'puter') { el.className = 'badge voice-status b-ok'; el.textContent = '✓ AI VOICE'; }
      else if (this.engine === 'browser') { el.className = 'badge voice-status b-warn'; el.textContent = '⚠ BROWSER VOICE'; }
      else { el.className = 'badge voice-status b-load'; el.textContent = '...'; }
    });
  },

  async speak(text) {
    if (this.muted || !this.ready || !text) return;
    this.stop();
    document.querySelectorAll('.narrate-btn').forEach(b => b.classList.add('speaking'));
    D.log(`Speaking [${chosenLang}]: "${text.substring(0, 50)}..."`);
    if (this.engine === 'puter') { await this._puter(text); }
    else { this._browser(text); }
  },

  async _puter(text) {
    const isHindi = chosenLang === 'hi';

    // Strategy 1: OpenAI (best quality, supports Hindi natively)
    try {
      const voiceName = isHindi ? "nova" : "onyx"; // nova = warm female, onyx = deep dramatic male
      const instructions = isHindi
        ? "You are an ancient Indian storyteller narrating in Hindi. Speak slowly, mysteriously, with deep emotion. Pause dramatically between sentences. Your voice should feel like a grandmother telling sacred tales by firelight."
        : "You are an ancient sage narrating an epic tale in English. Speak slowly and dramatically with gravitas. Pause between sentences for effect. Sound mysterious and wise, like a voice from thousands of years ago.";
      
      D.log(`Trying OpenAI [${voiceName}]...`);
      const audio = await puter.ai.txt2speech(text, {
        provider: "openai",
        voice: voiceName,
        model: "gpt-4o-mini-tts",
        instructions: instructions
      });
      this.audio = audio;
      await audio.play();
      audio.onended = () => this._end();
      D.ok(`OpenAI [${voiceName}] playing!`);
      return;
    } catch(e) { D.w('OpenAI failed: ' + e.message); }

    // Strategy 2: ElevenLabs (great quality)
    try {
      D.log('Trying ElevenLabs...');
      const audio = await puter.ai.txt2speech(text, {
        provider: "elevenlabs",
        voice: "21m00Tcm4TlvDq8ikWAM", // Rachel
        model: "eleven_multilingual_v2"
      });
      this.audio = audio;
      await audio.play();
      audio.onended = () => this._end();
      D.ok('ElevenLabs playing!');
      return;
    } catch(e) { D.w('ElevenLabs failed: ' + e.message); }

    // Strategy 3: AWS Polly
    try {
      const voice = isHindi ? "Kajal" : "Joanna";
      const lang = isHindi ? "hi-IN" : "en-US";
      D.log(`Trying Polly [${voice}]...`);
      const audio = await puter.ai.txt2speech(text, {
        voice: voice, engine: "neural", language: lang
      });
      this.audio = audio;
      await audio.play();
      audio.onended = () => this._end();
      D.ok(`Polly [${voice}] playing!`);
      return;
    } catch(e) { D.w('Polly neural failed: ' + e.message); }

    // Strategy 4: Simplest Puter call
    try {
      D.log('Trying basic Puter...');
      const audio = await puter.ai.txt2speech(text);
      this.audio = audio;
      await audio.play();
      audio.onended = () => this._end();
      D.ok('Basic Puter playing!');
      return;
    } catch(e) { D.err('All Puter attempts failed: ' + e.message); }

    D.w('Falling back to browser speech...');
    this._browser(text);
  },

  _browser(text) {
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.72; u.pitch = 0.85; u.volume = 0.85;
      const voices = speechSynthesis.getVoices();
      const isHindi = chosenLang === 'hi';
      const v = isHindi
        ? (voices.find(v=>v.lang==='hi-IN') || voices.find(v=>v.lang.startsWith('hi')) || voices.find(v=>v.lang.startsWith('en'))||voices[0])
        : (voices.find(v=>v.lang==='en-IN') || voices.find(v=>v.lang==='en-GB') || voices.find(v=>v.lang.startsWith('en'))||voices[0]);
      if(v){u.voice=v; D.log('Browser voice: '+v.name)}
      u.onend=()=>this._end();
      speechSynthesis.speak(u);
    } catch(e) { D.err('Browser speech failed'); this._end(); }
  },

  _end() { document.querySelectorAll('.narrate-btn').forEach(b=>b.classList.remove('speaking')); },
  stop() {
    if(this.audio){try{this.audio.pause();this.audio.currentTime=0}catch(e){};this.audio=null}
    try{speechSynthesis.cancel()}catch(e){}; this._end();
  },
  toggleMute() {
    this.muted=!this.muted;
    if(this.muted){this.stop();Ambient.stop()}
    document.querySelectorAll('.mute-btn').forEach(b=>b.textContent=this.muted?'🔇':'🔊');
  }
};

const Ambient={ctx:null,nodes:[],on:false,
  start(){if(this.on||Voice.muted)return;try{const c=new(window.AudioContext||window.webkitAudioContext)();this.ctx=c;[130.81,196,261.63].forEach(f=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(.015,c.currentTime+2);o.connect(g);g.connect(c.destination);o.start();this.nodes.push({o,g})});this.on=true}catch(e){}},
  stop(){if(!this.on)return;this.nodes.forEach(({o,g})=>{try{g.gain.linearRampToValueAtTime(0,this.ctx.currentTime+.5);o.stop(this.ctx.currentTime+.6)}catch(e){}});this.nodes=[];this.on=false;setTimeout(()=>{try{this.ctx?.close()}catch(e){};this.ctx=null},800)}
};

  {title:"The Sacred Board", icon:"📜",
  en:"The board is not a board. It is a map, of the universe. One hundred squares. Three realms. One destination. Squares 1 to 33, Bhuloka, the Earthly Realm. Here the chaos of mortal life rages. Snakes and ladders everywhere. Fortune changes with every step. This is where most souls are trapped. Endlessly cycling. Squares 34 to 66, Antarloka, the Inner Realm. The noise fades. The serpents here don't bite your body. They poison your mind. Squares 67 to 99, Svargaloka, the Celestial Realm. So close to freedom you can taste it. But the serpents here are the most deadly. One fall can destroy lifetimes of progress. And at Square 100, Moksha. Liberation. The end of suffering. But reaching it, is only half the battle.",

let page = 0;

function show(id) {
  document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function selectLang(lang) {
  chosenLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('lang-' + lang).classList.add('selected');
  document.getElementById('begin-btn').style.opacity = '1';
  document.getElementById('begin-btn').disabled = false;
  D.log('Language selected: ' + lang);
}

function begin() {
  if (!chosenLang) return;
  audioUnlocked = true; // User clicked — autoplay now allowed
  Ambient.start();
  page = 0;
  renderPage();
  show('screen-story');
  // Auto-narrate after short delay (user click unlocked audio)
  setTimeout(() => Voice.speak(STORIES[0][chosenLang]), 500);
}

function renderPage() {
  const s = STORIES[page];
  document.getElementById('s-icon').textContent = s.icon;
  document.getElementById('s-title').textContent = s.title;
  document.getElementById('s-count').textContent = `${page+1} / ${STORIES.length}`;
  const bd = document.getElementById('s-body');
  bd.innerHTML = '';
  s.body.split('\n\n').forEach((p, i) => {
    const el = document.createElement('p');
    el.style.cssText = `font-size:clamp(13px,1.8vw,16px);line-height:2.2;color:#d0c090;margin:${i?'18px':'0'} 0 0;white-space:pre-line`;
    el.textContent = p;
    bd.appendChild(el);
  });
  document.getElementById('s-back').style.visibility = page > 0 ? 'visible' : 'hidden';
  const nxt = document.getElementById('s-next');
  nxt.textContent = page >= STORIES.length - 1 ? 'Enter the Game →' : 'Next →';
  const c = document.getElementById('s-wrap');
  c.style.animation = 'none';
  requestAnimationFrame(() => c.style.animation = 'slideUp .8s ease');
}

function nextPage() {
  Voice.stop();
  if (page < STORIES.length - 1) {
    page++;
    renderPage();
    // Auto-narrate (audio already unlocked from BEGIN click)
    setTimeout(() => Voice.speak(STORIES[page][chosenLang]), 400);
  } else {
    show('screen-done');
  }
}

function backPage() {
  Voice.stop();
  if (page > 0) {
    page--;
    renderPage();
    setTimeout(() => Voice.speak(STORIES[page][chosenLang]), 400);
  }
}

function renarrate() {
  Voice.speak(STORIES[page][chosenLang]);
}

// Speak character lore
function speakChar(charId) {
  const lore = CHAR_VOICE[charId];
  if (lore) Voice.speak(lore[chosenLang]);
}

window.addEventListener('load', () => {
  setTimeout(() => Voice.init(), 800);
  // Pre-load browser voices
  try { speechSynthesis.getVoices(); } catch(e) {}
});
</script>
